<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Узнать подробнее</title>
  <link rel="stylesheet" href="Projects/styles/projects.scss">
  <link rel="stylesheet" href="../../../dist/styles.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<div class="back">
	<picture>
		<img src="images/left.svg" alt="left">
	</picture>
	<span>Вернуться назад</span>
</div>

<main class="submit">
	<div class="left">
		<h4>Заказать звонок</h4>
		<h4>Оставить заявку</h4>
	</div>
	<div class="right">
		<h3>Остались вопросы?</h3>
    <p>Напишите нам или закажите звонок — мы поможем. Выслушаем ваши задачи для бизнеса, и на их основе предложим варианты развития.</p>
    <form action="#">
      <input type="text" placeholder="Ваше имя*" name="name" class="info">
      <input type="email" placeholder="E-mail*" name="email" class="info">
      <input type="text" placeholder="Название компании" name="company" class="info">
      <textarea name="task" rows="2" class="info task" placeholder="Расскажите, пожалуйста, какие задачи вам необходимо решить"></textarea>
      <label for="assent"><input type="checkbox"  id="assent">Я соглашаюсь с <a href="#">Политикой конфиденциальности</a></label>
      <input type="submit" class="button--green" placeholder="Отправить заявку">
    </form>
	</div>
</main>
